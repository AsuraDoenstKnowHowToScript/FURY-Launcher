name: Bug report
description: Report a problem with FURY Launcher
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as you can. Clear steps to reproduce and your `crash.log` make a fix much faster.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
      placeholder: When I click X, the launcher does Y instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen?
      placeholder: |
        1. Open the launcher
        2. Go to the ... tab
        3. Click ...
        4. See the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: dropdown
    id: version
    attributes:
      label: Launcher version
      description: Shown in the About tab.
      options:
        - v0.3.8-beta
        - v0.3.7-beta
        - v0.3.6-beta
        - Other (write it in the description)
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the launcher is affected?
      options:
        - Microsoft login
        - Offline / profiles
        - Instances (create / edit / delete)
        - Mods / Modrinth
        - Forge / NeoForge / Fabric install
        - Skins / capes
        - Language / translation
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 (64-bit)
    validations:
      required: false
  - type: textarea
    id: crashlog
    attributes:
      label: crash.log
      description: Paste the relevant lines from `crash.log` (next to the executable), if any.
      render: text
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, extra context, etc.
    validations:
      required: false
