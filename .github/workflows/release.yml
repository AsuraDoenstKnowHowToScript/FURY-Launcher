name: Release

# Builds the Windows self-contained single-file .exe and publishes a GitHub
# Release with it attached. Run it from the Actions tab ("Run workflow") or via
# the API; set the version (without the leading v).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 0.4.1)"
        required: true
        default: "0.4.1"
      prerelease:
        description: "Mark as a pre-release (beta)?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FURY.sln

      - name: Publish (win-x64, self-contained, single file)
        run: >
          dotnet publish Launcher.App/Launcher.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o dist/win-x64

      - name: Show published files
        shell: pwsh
        run: Get-ChildItem dist/win-x64 | Select-Object Name, Length | Format-Table -AutoSize

      - name: Package
        shell: pwsh
        run: |
          $zip = "FURY-Launcher-v${{ github.event.inputs.version }}-win-x64.zip"
          Compress-Archive -Path dist/win-x64/* -DestinationPath $zip -Force
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          A patch release focused on content search speed.

          ## Faster content search
          Searching mods, shaders and datapacks is noticeably quicker:

          - Requests now negotiate **HTTP/2** and ask for **compression**, so search
            results arrive on a smaller, warmer connection instead of paying a fresh
            handshake and downloading uncompressed JSON.
          - The type-to-search delay is shorter, so results start loading sooner
            after you stop typing.
          - Thumbnail downloads are throttled so they no longer compete with the
            search and next-page requests for bandwidth.

          ## How to run
          Download the zip below, unzip, run `FURY Launcher.exe`. Windows 10/11
          (64-bit), self-contained: no .NET install required.
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FLAGS="--latest"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then FLAGS="--prerelease"; fi
          # Idempotent: drop any existing release + tag for this version, then recreate.
          gh release delete "v${{ github.event.inputs.version }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "v${{ github.event.inputs.version }}" "$ASSET" \
            --title "FURY Launcher v${{ github.event.inputs.version }}" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}" \
            $FLAGS
