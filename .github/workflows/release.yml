name: Release

# Builds the Windows self-contained single-file .exe and publishes a GitHub
# Release with it attached. Run it from the Actions tab ("Run workflow") or via
# the API; set the version (without the leading v).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 0.4.2)"
        required: true
        default: "0.4.2"
      prerelease:
        description: "Mark as a pre-release (beta)?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Writes the CurseForge API key from a repo secret so it is embedded in the build.
      # If the secret is unset the file is empty and the CurseForge source stays disabled.
      # The key file is git-ignored and never committed.
      - name: Embed CurseForge key
        shell: bash
        run: printf '%s' "${{ secrets.CURSEFORGE_API_KEY }}" > Launcher.Core/curseforge.key

      - name: Restore
        run: dotnet restore FURY.sln

      - name: Publish (win-x64, self-contained, single file)
        run: >
          dotnet publish Launcher.App/Launcher.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o dist/win-x64

      - name: Show published files
        shell: pwsh
        run: Get-ChildItem dist/win-x64 | Select-Object Name, Length | Format-Table -AutoSize

      - name: Package
        shell: pwsh
        run: |
          $zip = "FURY-Launcher-v${{ github.event.inputs.version }}-win-x64.zip"
          Compress-Archive -Path dist/win-x64/* -DestinationPath $zip -Force
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          A mods-focused release: search both stores, and safer installs.

          ## CurseForge search
          The mod browser now has **Modrinth** and **CurseForge** side by side. Pick a
          source and the same cards, paging and one-click install work exactly the same,
          so a mod that only exists on one store is no longer a dead end.

          ## Incompatible-mod guard
          Installing a mod that conflicts with one you already have (for example
          **Sodium** vs **Embeddium**, or **Iris** vs **Oculus**) now warns you and
          offers to cancel or replace the installed one, instead of quietly breaking the game.

          ## Installed-state fix
          A mod could show as installed in the browser but be missing from the instance's
          mod list. The installed mark is now read straight from the mods folder, so the
          browser and the list always agree.

          ## How to run
          Download the zip below, unzip, run `FURY Launcher.exe`. Windows 10/11
          (64-bit), self-contained: no .NET install required.
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FLAGS="--latest"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then FLAGS="--prerelease"; fi
          # Idempotent: drop any existing release + tag for this version, then recreate.
          gh release delete "v${{ github.event.inputs.version }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "v${{ github.event.inputs.version }}" "$ASSET" \
            --title "FURY Launcher v${{ github.event.inputs.version }}" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}" \
            $FLAGS
