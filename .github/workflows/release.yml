name: Release

# Builds the Windows self-contained single-file .exe and publishes a GitHub
# Release with it attached. Run it from the Actions tab ("Run workflow") or via
# the API; set the version (without the leading v).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 0.5.0)"
        required: true
        default: "0.5.0"
      prerelease:
        description: "Mark as a pre-release (beta)?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Writes the CurseForge API key from a repo secret so it is embedded in the build.
      # The secret is passed through an environment variable, NOT interpolated into the
      # script: CurseForge keys are bcrypt strings ($2a$10$...) and inlining them lets bash
      # re-expand the $ sequences and corrupt the key. Reading it from $CF_KEY keeps it
      # intact. If the secret is unset the file is empty and the source stays disabled.
      # The key file is git-ignored and never committed.
      - name: Embed CurseForge key
        shell: bash
        env:
          CF_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: printf '%s' "$CF_KEY" > Launcher.Core/curseforge.key

      - name: Restore
        run: dotnet restore FURY.sln

      - name: Publish (win-x64, self-contained, single file)
        run: >
          dotnet publish Launcher.App/Launcher.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o dist/win-x64

      - name: Show published files
        shell: pwsh
        run: Get-ChildItem dist/win-x64 | Select-Object Name, Length | Format-Table -AutoSize

      - name: Package
        shell: pwsh
        run: |
          $zip = "FURY-Launcher-v${{ github.event.inputs.version }}-win-x64.zip"
          Compress-Archive -Path dist/win-x64/* -DestinationPath $zip -Force
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          The first stable release. A full visual overhaul and a rebuilt account
          system, on top of the quality-of-life work from the beta.

          ## Unified accounts
          Offline profiles and Microsoft accounts are now one thing: a single
          account list. Pick who plays from a card on the Accounts tab; the Home
          screen shows the active account as a chip. Offline accounts keep their
          own skin, cape and body model (Steve/Alex); Microsoft accounts show a
          read-only skin pulled from Mojang. Multiple Microsoft accounts are
          supported, each resumed on its own — an expired session is flagged and
          re-signed-in on demand. Your existing offline profiles migrate over
          automatically on first launch.

          ## Redesigned interface
          - Deeper, layered dark-violet theme with softer depth and pill accents.
          - Home leads with an instance hero band; one-row toolbars throughout.
          - Composited head avatars on account cards and the Home chip.
          - Frame-synced smooth scrolling and animated hover outlines; the Content
            lists no longer feel laggy.
          - The Content browser now searches automatically when you open it.

          ## Also included
          - Built-in Java installer (Settings > Java: Temurin 8/17/21) with live
            progress, and a Logs section that mirrors the session log with Copy and
            Open-folder shortcuts.
          - Download progress shows a percentage and hides when idle.

          ## How to run
          Download the zip below, unzip, run `FURY Launcher.exe`. Windows 10/11
          (64-bit), self-contained: no .NET install required.
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FLAGS="--latest"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then FLAGS="--prerelease"; fi
          # Idempotent: drop any existing release + tag for this version, then recreate.
          gh release delete "v${{ github.event.inputs.version }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "v${{ github.event.inputs.version }}" "$ASSET" \
            --title "FURY Launcher v${{ github.event.inputs.version }}" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}" \
            $FLAGS
