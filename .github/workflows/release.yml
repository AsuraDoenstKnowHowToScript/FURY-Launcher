name: Release

# Builds the Windows self-contained single-file .exe and publishes a GitHub
# Release with it attached. Run it from the Actions tab ("Run workflow") or via
# the API; set the version (without the leading v).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 0.4.3-beta)"
        required: true
        default: "0.4.3-beta"
      prerelease:
        description: "Mark as a pre-release (beta)?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Writes the CurseForge API key from a repo secret so it is embedded in the build.
      # The secret is passed through an environment variable, NOT interpolated into the
      # script: CurseForge keys are bcrypt strings ($2a$10$...) and inlining them lets bash
      # re-expand the $ sequences and corrupt the key. Reading it from $CF_KEY keeps it
      # intact. If the secret is unset the file is empty and the source stays disabled.
      # The key file is git-ignored and never committed.
      - name: Embed CurseForge key
        shell: bash
        env:
          CF_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: printf '%s' "$CF_KEY" > Launcher.Core/curseforge.key

      - name: Restore
        run: dotnet restore FURY.sln

      - name: Publish (win-x64, self-contained, single file)
        run: >
          dotnet publish Launcher.App/Launcher.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o dist/win-x64

      - name: Show published files
        shell: pwsh
        run: Get-ChildItem dist/win-x64 | Select-Object Name, Length | Format-Table -AutoSize

      - name: Package
        shell: pwsh
        run: |
          $zip = "FURY-Launcher-v${{ github.event.inputs.version }}-win-x64.zip"
          Compress-Archive -Path dist/win-x64/* -DestinationPath $zip -Force
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          A beta focused on quality of life. Please report anything odd — this build
          goes stable once it has been tested.

          ## Built-in Java installer
          Settings > Java can now download and install Java for you (Eclipse Temurin
          8, 17 or 21). No more hunting for the right version when a Minecraft
          release needs a newer Java than the one you have. The install shows live
          progress and is picked as the default when it finishes.

          ## Logs in Settings
          A new Logs section in Settings mirrors the session log, with one-click
          Copy and an Open folder button that takes you straight to `crash.log`.

          ## Interface polish
          - The Modrinth and CurseForge buttons now carry their real logos.
          - CurseForge search is temporarily marked "coming soon" while its
            integration is finished; Modrinth remains fully live.
          - Download progress now shows a percentage.
          - Scrollbars no longer overlap the instance and mod cards.

          ## How to run
          Download the zip below, unzip, run `FURY Launcher.exe`. Windows 10/11
          (64-bit), self-contained: no .NET install required.
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FLAGS="--latest"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then FLAGS="--prerelease"; fi
          # Idempotent: drop any existing release + tag for this version, then recreate.
          gh release delete "v${{ github.event.inputs.version }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "v${{ github.event.inputs.version }}" "$ASSET" \
            --title "FURY Launcher v${{ github.event.inputs.version }}" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}" \
            $FLAGS
